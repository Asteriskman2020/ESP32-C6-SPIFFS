name: Build KMUTT Data Logger V1 APK

on:
  push:
    branches: [main, master]
    paths:
      - 'Version-1/KMUTTDataLogger/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build APK
        working-directory: Version-1/KMUTTDataLogger
        run: chmod +x gradlew && ./gradlew assembleDebug
      - name: Copy APK
        run: cp Version-1/KMUTTDataLogger/app/build/outputs/apk/debug/app-debug.apk Version-1/KMUTTDataLogger.apk
      - name: Commit APK
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Version-1/KMUTTDataLogger.apk
          git diff --cached --quiet || git commit -m "Auto-update KMUTTDataLogger.apk [skip ci]"
          git push
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1-latest
          name: KMUTT Data Logger V1 (Latest)
          files: Version-1/KMUTTDataLogger/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
